version: "1"

services:
  - type: web
    name: nexgen-study
    runtime: node
    region: oregon
    plan: starter
    branch: main
    rootDir: .
    buildCommand: npm install --omit=dev && npx prisma generate --schema=prisma/schema.prisma
    startCommand: npx prisma db push --schema=prisma/schema.prisma --accept-data-loss && npm start
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: nexgen-study-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL_SONNET
        value: claude-sonnet-4-6
      - key: ANTHROPIC_MODEL_HAIKU
        value: claude-haiku-4-5-20251001
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_SCHOLAR
        sync: false
      - key: STRIPE_PRICE_RESEARCHER
        sync: false
      - key: STRIPE_SCHOLAR_LINK
        value: https://buy.stripe.com/14A9AT9p83rfbDddjI1oI0k
      - key: STRIPE_RESEARCHER_LINK
        value: https://buy.stripe.com/dRm7sL7h09PDePpa7w1oI0l
      - key: SUPABASE_URL
        value: https://bvwgqafekmfqpylsrteu.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://nexgen-study.onrender.com/api/auth/google/callback
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_CALLBACK_URL
        value: https://nexgen-study.onrender.com/api/auth/microsoft/callback
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_SECURE
        value: true
      - key: SMTP_USER
        value: resend
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: "NexGen Study <support@corverxis.com>"
      - key: CORS_ORIGINS
        value: https://nexgen-study.onrender.com
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 500
      - key: RATE_LIMIT_AI_MAX
        value: 20
      - key: BCRYPT_ROUNDS
        value: 12
      - key: DEFAULT_DATA_RETENTION_DAYS
        value: 365
      - key: TRIAL_EXPIRY_DAYS
        value: 7

databases:
  - name: nexgen-study-db
    databaseName: nexgen_study
    user: nexgen_study_user
    region: oregon
    plan: basic
    ipAllowList: []
